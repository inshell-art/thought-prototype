<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/inshell.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THOUGHT</title>
</head>

<body class="frontpage">
  <link rel="stylesheet" href="/src/style.css">

  <main class="frontpage-shell">
    <section class="frontpage-stage" aria-labelledby="frontpage-title">
      <h1 id="frontpage-title" class="frontpage-title">THOUGHT</h1>

      <div class="thought-canvas-frame">
        <canvas
          id="thought-grid"
          class="thought-grid"
          width="960"
          height="540"
          aria-label="Canvas preview of the current character squares"
        ></canvas>
      </div>

      <div class="frontpage-input-panel">
        <div class="frontpage-actions">
          <div class="frontpage-cta">
            <button id="run-agent" class="frontpage-button" type="button">[ run ]</button>
            <button
              id="reset-thought"
              class="frontpage-reset is-hidden"
              type="button"
              aria-label="Clear current thought"
            >
              x
            </button>
          </div>
          <div class="frontpage-notices">
            <span id="run-status" class="frontpage-status is-hidden" aria-live="polite"></span>
            <div id="input-warning" class="frontpage-warning is-hidden" role="alert" aria-live="polite"></div>
          </div>
        </div>
        <label class="frontpage-label" for="prompt-box">prompt</label>
        <input
          id="prompt-box"
          class="frontpage-prompt"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="author a one-round thought agent with your prompt"
        />
        <label class="frontpage-label" for="provider-box">provider</label>
        <div class="frontpage-select-wrap">
          <select id="provider-box" class="frontpage-select">
            <option value="harness">local harness</option>
            <option value="openai">openai</option>
            <option value="groq">groq</option>
            <option value="anthropic">anthropic</option>
            <option value="openrouter">openrouter</option>
          </select>
          <span class="frontpage-select-arrow" aria-hidden="true"></span>
        </div>
        <label class="frontpage-label" for="api-key-box">api key</label>
        <input
          id="api-key-box"
          class="frontpage-input"
          type="password"
          autocomplete="off"
          spellcheck="false"
          placeholder="paste a local api key for this browser session"
        />
        <label class="frontpage-label" for="model-box">model</label>
        <input
          id="model-box"
          class="frontpage-input"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="model name"
        />
        <p class="frontpage-note">
          one round only. the page sends your prompt plus bundled <code>THOUGHT.md</code> to the
          selected provider, then converts the returned text into images on the canvas.
        </p>
      </div>

      <section class="agent-output-panel">
        <pre id="agent-output" class="agent-output"></pre>
      </section>

      <section class="color-font-panel" aria-labelledby="color-font-title">
        <div class="color-font-header">
          <p class="frontpage-label">color font</p>
        </div>
        <div id="color-font-legend" class="color-font-legend" aria-label="Color font legend"></div>
      </section>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
